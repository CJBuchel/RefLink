services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      FMS_HOST: ${FMS_HOST:-10.0.100.5}
      FMS_PORT: ${FMS_PORT:-8080}
      FMS_DISPLAY_ID: ${FMS_DISPLAY_ID:-5333}
      FMS_ADMIN_PASSWORD: ${FMS_ADMIN_PASSWORD:-}
    depends_on:
      - redis
    ports:
      - "50051:50051"

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis:/data
    ports:
      - "6379:6379"

volumes:
  redis:
