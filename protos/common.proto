syntax = "proto3";

package reflink.common;

enum TeamAllianceStationType {
  TEAM_ALLIANCE_STATION_TYPE_UNSPECIFIED = 0;
  TEAM_ALLIANCE_STATION_TYPE_RED_1 = 1;
  TEAM_ALLIANCE_STATION_TYPE_RED_2 = 2;
  TEAM_ALLIANCE_STATION_TYPE_RED_3 = 3;
  TEAM_ALLIANCE_STATION_TYPE_BLUE_1 = 4;
  TEAM_ALLIANCE_STATION_TYPE_BLUE_2 = 5;
  TEAM_ALLIANCE_STATION_TYPE_BLUE_3 = 6;
}

enum PanelType {
  PANEL_TYPE_UNSPECIFIED = 0;
  PANEL_TYPE_HEAD_REFEREE = 1;
  PANEL_TYPE_RED_NEAR = 2;
  PANEL_TYPE_RED_FAR = 3;
  PANEL_TYPE_BLUE_NEAR = 4;
  PANEL_TYPE_BLUE_FAR = 5;
}

enum RefereeVote {
  REFEREE_VOTE_UNSPECIFIED = 0;
  REFEREE_VOTE_DISAGREE = 1;
  REFEREE_VOTE_AGREE = 2;
}

enum AutoClimbState {
  AUTO_CLIMB_STATE_UNSPECIFIED = 0;
  AUTO_CLIMB_STATE_NOTHING = 1;
  AUTO_CLIMB_STATE_LEVEL_1 = 2;
}

enum CardType {
  CARD_TYPE_UNSPECIFIED = 0;
  CARD_TYPE_YELLOW = 1;
  CARD_TYPE_RED = 2;
}

enum EndgameClimbState {
  ENDGAME_CLIMB_STATE_UNSPECIFIED = 0;
  ENDGAME_CLIMB_STATE_NOTHING = 1;
  ENDGAME_CLIMB_STATE_LEVEL_1 = 2;
  ENDGAME_CLIMB_STATE_LEVEL_2 = 3;
  ENDGAME_CLIMB_STATE_LEVEL_3 = 4;
}

message MatchFouls {
  int32 red_minor_fouls = 1;
  int32 red_major_fouls = 2;
  int32 blue_minor_fouls = 3;
  int32 blue_major_fouls = 4;
}

message MatchCards {
  CardType red_alliance_station_1 = 1;
  CardType red_alliance_station_2 = 2;
  CardType red_alliance_station_3 = 3;
  CardType blue_alliance_station_1 = 4;
  CardType blue_alliance_station_2 = 5;
  CardType blue_alliance_station_3 = 6;
}

message AllianceAutoClimb {
  AutoClimbState auto_climb_alliance_station_1 = 1;
  AutoClimbState auto_climb_alliance_station_2 = 2;
  AutoClimbState auto_climb_alliance_station_3 = 3;
}

message AllianceEndgameClimb {
  EndgameClimbState endgame_climb_alliance_station_1 = 1;
  EndgameClimbState endgame_climb_alliance_station_2 = 2;
  EndgameClimbState endgame_climb_alliance_station_3 = 3;
}

message RefereePanelState {
  RefereeVote referee_vote = 1;
  AllianceAutoClimb auto_climb = 2;
  bool auto_submitted = 3;
  bool auto_issue = 4;
  MatchFouls match_fouls = 5;
  MatchCards match_cards = 6;
  bool rp_issue = 7;
  bool discussion_needed = 8;
  AllianceEndgameClimb endgame_climb = 9;
  bool endgame_submitted = 10;
  bool endgame_issue = 11;
}

// MATCH is the initial state before either signal has been given this match cycle (resets
// there only when a new match starts). Once past MATCH, the head referee can freely toggle
// between COUNT and RESET (each toggle relays the corresponding Cheesy Arena signal) to
// correct an accidental press.
enum FieldState {
  FIELD_STATE_MATCH = 0;
  FIELD_STATE_COUNT = 1;
  FIELD_STATE_RESET = 2;
}

message AllianceBypass {
  bool station_1 = 1;
  bool station_2 = 2;
  bool station_3 = 3;
}

message HeadRefereePanelState {
  MatchFouls match_fouls = 1;
  MatchCards match_cards = 2;
  bool ref_review_required = 3;
  FieldState field_state = 4;
  bool two_minute_warning_given = 5;
  int64 two_minute_warning_expires_at_unix_sec = 6;
  AllianceBypass red_bypass = 7;
  AllianceBypass blue_bypass = 8;
}

enum MatchPhase {
  MATCH_PHASE_IDLE_UNSPECIFIED = 0;
  MATCH_PHASE_PRE_MATCH = 1;
  MATCH_PHASE_AUTO = 2;
  MATCH_PHASE_TELEOP = 3;
  MATCH_PHASE_ENDGAME = 4;
  MATCH_PHASE_POST_MATCH = 5;
}

enum MatchType {
  MATCH_TYPE_UNSPECIFIED = 0;
  MATCH_TYPE_PRACTICE = 1;
  MATCH_TYPE_QUALIFICATION = 2;
  MATCH_TYPE_PLAYOFF = 3;
}
