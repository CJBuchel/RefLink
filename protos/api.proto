syntax = "proto3";

package reflink.api;

import public "common.proto";

message GetHealthRequest {}
message GetHealthResponse {}

service HealthService {
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
  rpc StreamHealth(GetHealthRequest) returns (stream GetHealthResponse);
}

// ==========================
// Head/Referee Panel
// ==========================

// ----- Client -> Server -----

message RefereeStreamRequest {
  common.PanelType panel = 1;
  int32 match_id = 2;
  common.RefereePanelState state = 3;
}

// ----- Server -> Client -----

message MatchStationState {
  string team_number = 1;
  bool bypassed = 2;
 common.TeamAllianceStationType alliance_station = 3;
}

message MatchAllianceState {
  MatchStationState alliance_team_1_state = 1;
  MatchStationState alliance_team_2_state = 2;
  MatchStationState alliance_team_3_state = 3;
}

message RefereeStreamResponse {
  int32 match_id = 1;
  common.MatchPhase match_phase = 2;
  MatchAllianceState red_alliance_state = 3;
  MatchAllianceState blue_alliance_state = 4;
  common.RefereePanelState partner_panel = 5;
  // Matches remaining until rotation (0 = rotate now) - the client derives whether/when to
  // notify from this rather than a separate boolean.
  int32 rotate_in = 7;
  bool ref_review_required = 8;
}

message HeadRefereeStreamRequest {
  int32 match_id = 1;
  common.HeadRefereePanelState state = 2;
}

// Whether each of the four regular referee panels currently has a live connection to the
// server - internal to RefLink, unrelated to Cheesy Arena.
message PanelPresence {
  bool rn = 1;
  bool rf = 2;
  bool bn = 3;
  bool bf = 4;
}

message HeadRefereeStreamResponse {
  int32 match_id = 1;
  common.MatchPhase match_phase = 2;
  MatchAllianceState red_alliance_state = 3;
  MatchAllianceState blue_alliance_state = 4;
  common.RefereePanelState rn = 5;
  common.RefereePanelState rf = 6;
  common.RefereePanelState bn = 7;
  common.RefereePanelState bf = 8;
  int32 rotate_in = 10;
  PanelPresence panel_presence = 11;
  // Echoes back the server's authoritative (clamped) copy of the head referee's own
  // submitted state - notably `field_state`, since the one-way MATCH->COUNT->RESET
  // transition is enforced server-side, not by the submitting client.
  common.HeadRefereePanelState hr = 12;
}

service RefereePanelService {
  rpc RefereeStream(stream RefereeStreamRequest) returns (stream RefereeStreamResponse);
}


service HeadRefereePanelService {
  rpc HeadRefereeStream(stream HeadRefereeStreamRequest) returns (stream HeadRefereeStreamResponse);
}
