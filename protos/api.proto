syntax = "proto3";

package reflink.api;

import public "common.proto";

message GetHealthRequest {}
message GetHealthResponse {}

service HealthService {
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
  rpc StreamHealth(GetHealthRequest) returns (stream GetHealthResponse);
}

// ----- Client -> Server -----

message RefereeStreamRequest {
  common.PanelType panel = 1;
  int32 match_id = 2;
  common.RefereePanelState state = 3;
}

// ----- Server -> Client -----

message RefereeStreamResponse {
  int32 match_id = 1;
  common.MatchPhase match_phase = 2;
  string alliance_station_1_team_number = 3;
  string alliance_station_2_team_number = 4;
  string alliance_station_3_team_number = 5;
  common.RefereePanelState partner_panel = 6;
}

service RefereePanelService {
  rpc RefereeStream(stream RefereeStreamRequest) returns (stream RefereeStreamResponse);
}
